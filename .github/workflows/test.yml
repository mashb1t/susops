name: Tests

on:
  push:
    branches: ["main", "master", "feature/**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra tui

      - name: Run tests
        # Exclude the macOS-only GUI smoke marker on the Linux matrix runner.
        run: uv run pytest --cov=susops --cov-report=xml -v -m "not gui"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  gui-smoke:
    # macOS-only GUI smoke for the rumps tray. Manually triggered to avoid
    # blocking PR merges on flaky GUI runs.
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (includes tray-mac)
        run: uv sync --extra dev --extra tui --extra tray-mac

      - name: Run GUI smoke
        run: uv run pytest -m gui -v
