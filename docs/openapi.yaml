      - $ref: '#/components/schemas/InvokeShare'
      - $ref: '#/components/schemas/InvokeShareIsRunning'
      - $ref: '#/components/schemas/InvokeStart'
      - $ref: '#/components/schemas/InvokeStatus'
      - $ref: '#/components/schemas/InvokeStop'
      - $ref: '#/components/schemas/InvokeStopQuick'
      - $ref: '#/components/schemas/InvokeStopShare'
      - $ref: '#/components/schemas/InvokeTest'
      - $ref: '#/components/schemas/InvokeTestAll'
      - $ref: '#/components/schemas/InvokeTestConnection'
      - $ref: '#/components/schemas/InvokeTestDomain'
      - $ref: '#/components/schemas/InvokeTestForward'
      - $ref: '#/components/schemas/InvokeTestSsh'
      - $ref: '#/components/schemas/InvokeToggleForwardEnabled'
      - $ref: '#/components/schemas/InvokeUpdateAppConfig'
      - $ref: '#/components/schemas/InvokeUpdateConfig'
      discriminator:
        propertyName: method
    InvocationResponseSuccess:
      type: object
      required:
      - ok
      properties:
        ok:
          type: boolean
          const: true
        result:
          description: Method return value. Type-tagged via rpc_protocol.py — Pydantic models, 
            dataclasses, enums, sets, and Paths are all serialised as JSON-friendly forms with a 
            `__type__` discriminator. See the per-method `XxxResult` schemas.
    InvocationResponseError:
      type: object
      required:
      - ok
      - error
      - error_type
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
          description: Error message.
        error_type:
          type: string
          description: Python exception class name. Clients map known names (ValueError, 
            RuntimeError, FileNotFoundError, PermissionError, KeyError, AttributeError) back to the 
            matching exception; everything else falls back to RuntimeError.
    StatusEvent:
      oneOf:
      - $ref: '#/components/schemas/StateEvent'
      - $ref: '#/components/schemas/ShareEvent'
      - $ref: '#/components/schemas/ForwardEvent'
      - $ref: '#/components/schemas/BandwidthEvent'
    StateEvent:
      type: object
      description: Connection state change.
      required:
      - tag
      - running
      properties:
        tag:
          type: string
        running:
          type: boolean
        pid:
          type:
          - integer
          - 'null'
        reconnecting:
          type: boolean
    ShareEvent:
      type: object
      description: Share lifecycle change.
      required:
      - port
      properties:
        port:
          type: integer
        file:
          type: string
        running:
          type: boolean
        conn_tag:
          type: string
    ForwardEvent:
      type: object
      description: Port-forward registration / cancellation.
      required:
      - tag
      properties:
        tag:
          type: string
        fw_tag:
          type: string
        direction:
          type: string
          enum:
          - local
          - remote
        running:
          type: boolean
    BandwidthEvent:
      type: object
      description: Periodic bandwidth sample.
      required:
      - tag
      - rx_bps
      - tx_bps
      properties:
        tag:
          type: string
        rx_bps:
          type: number
        tx_bps:
          type: number
