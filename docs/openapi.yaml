openapi: 3.1.0
info:
  title: SusOps Services Daemon RPC
  version: 3.0.0-rc2
  description: "Internal HTTP API exposed by the `susops-services` daemon. Frontends (CLI, TUI, tray)
    call into it via the `SusOpsClient` proxy — there is no expectation that this API be consumed by anything
    else, but documenting it makes the contract explicit and lets you build alternative clients.\n\n**Bind
    address:** `127.0.0.1` — loopback only.\n\n**Authentication:** none. Any local process that can reach
    loopback and read `~/.susops/pids/susops-services.port` can invoke any allowlisted method. See the
    README's [Access & Authentication](https://github.com/mashb1t/susops#access--authentication) section."
  x-generated-at: '2026-06-04'
  x-generator: tools/gen_openapi.py
servers:
- url: http://127.0.0.1:{port}
  description: Local daemon. `port` is allocated at startup and written to 
    `~/.susops/pids/susops-services.port`.
  variables:
    port:
      default: '0'
      description: Daemon RPC port.
paths:
  /rpc:
    post:
      summary: Invoke a SusOpsManager method
      description: "Single endpoint dispatch. The request body's `method` field selects which `SusOpsManager.<method>(*args,
        **kwargs)` is invoked.\n\n**Allowlisted methods:**\n\n- `add_connection`\n- `add_local_forward`\n\
        - `add_pac_host`\n- `add_remote_forward`\n- `delete_share` — Stop and permanently remove a share
        from config.\n- `fetch` — Download and decrypt a shared file via a transient local forward slave.\n\
        - `get_bandwidth`\n- `get_bandwidth_totals` — Return cumulative (rx_bytes, tx_bytes) since last
        start. Resets on stop.\n- `get_logs`\n- `get_pac_url`\n- `get_process_info`\n- `get_status_url`\n\
        - `get_uptime` — Return seconds since connection started, or None if not recorded.\n- `is_udp_forward_running`
        — Return True if the UDP socat process for this forward is alive.\n- `list_config`\n- `list_shares`
        — Return info for all shares: running (in-memory) and stopped (config-only).\n- `process_info`
        — Return subprocess info grouped by connection for ``susops ps`` display.\n- `reconnect_monitor_info`
        — Return display info about the current reconnect monitor state.\n- `remove_connection`\n- `remove_local_forward`\n\
        - `remove_pac_host`\n- `remove_remote_forward`\n- `reset`\n- `restart`\n- `set_connection_enabled`\n\
        - `set_forward_enabled` — Set the enabled flag on a forward and start/stop the live process accordingly.\n\
        - `set_pac_host_enabled`\n- `share` — Start serving an encrypted file share and persist it to
        config.\n- `share_is_running`\n- `start`\n- `status`\n- `stop`\n- `stop_quick` — Non-blocking
        stop for TUI quit: signal all external processes immediately.\n- `stop_share` — Stop share server(s)
        without removing from config (entry shows as stopped).\n- `test`\n- `test_all`\n- `test_connection`
        — Test SSH reachability for a specific connection.\n- `test_domain` — Test domain reachability
        via the specified connection's SOCKS proxy.\n- `test_forward` — Check if a port forward is active.\n\
        - `test_ssh`\n- `toggle_forward_enabled` — Toggle enabled on a forward. Returns the new enabled
        state.\n- `update_app_config`\n- `update_config` — Update top-level SusOpsConfig fields (e.g.
        pac_server_port)."
      operationId: invoke
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvocationRequest'
      responses:
        '200':
          description: Method invoked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvocationResponseSuccess'
        '400':
          description: Malformed request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvocationResponseError'
        '404':
          description: Method not on the allowlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvocationResponseError'
        '500':
          description: Method raised an exception.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvocationResponseError'
  /events:
    get:
      summary: Subscribe to live status events (SSE)
      description: "Long-lived Server-Sent Events stream. The daemon pushes events of type `state`, `share`,
        `forward`, and `bandwidth` whenever the underlying facade emits them. Frontends use this to update
        icons / dashboards without polling.\n\nEvent format follows the standard SSE wire format:\n\n\
        ```\nevent: state\ndata: {\"tag\":\"work\",\"running\":true,\"pid\":1234}\n\n```\n\nClosing the
        stream is the canonical \"I'm leaving\" signal — when the last SSE client disconnects and the
        daemon has no in-flight work, it shuts down."
      operationId: events
      responses:
        '200':
          description: Streaming SSE response.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StatusEvent'
